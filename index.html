<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Editor</title>
    <!-- font-awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google Font  work sans-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- daysiUI cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.5.1/dist/full.css" rel="stylesheet" type="text/css" />
    <!-- tailwind cdn -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind CSS Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        // workSans: "'workSans', sans-serif"
                        workSans: "'Work Sans', sans-serif"
                    },
                    // colors: {
                    //     primary: '#F85559',
                    //     title: '#121212',
                    //     'dark-1': 'rgba(18, 18, 18, 0.60)',
                    //     'dark-2': 'rgba(18, 18, 18, 0.80)'
                    // }
                },
                container: {
                    center: true,
                    padding: {
                        DEFAULT: '1.5rem',
                        DEFAULT: '.5rem',
                        md: '2rem',
                        lg: '4rem',
                        xl: '5rem',
                        '2xl': '6rem'
                    }
                }
            }
        }
    </script>
</head>

<body>
    <header></header>
    <main class="container my-16">
        <section class="py-10 bg-blue-300 rounded-md ">
            <h1 class="mb-4 text-4xl font-semibold text-center uppercase">MY Text Editor</h1>
            <div class="w-11/12 mx-auto bg-blue-200 border-2 border-black rounded">
                <div class="flex items-center justify-between w-3/4 mx-auto my-2">
                    <!-- font style div -->
                    <div class="flex">
                        <div>
                            <button id="text-bold" class="text-xl btn btn-ghost"><i
                                    class="fa-solid fa-bold"></i></button>
                        </div>
                        <div>
                            <button id="text-italic" class="text-xl btn btn-ghost"><i
                                    class="fa-solid fa-italic"></i></button>
                        </div>
                        <div>
                            <button id="text-underline" class="text-xl btn btn-ghost"><i
                                    class="fa-solid fa-underline"></i></button>
                        </div>
                    </div>
                    <!-- font alignment div -->
                    <div class="flex ">
                        <div>
                            <button id="btn-left" class="text-xl btn btn-ghost"><i
                                    class="fa-solid fa-align-left"></i></button>
                        </div>
                        <div>
                            <button id="btn-center" class="text-xl btn btn-ghost"><i
                                    class="fa-solid fa-align-center"></i></button>
                        </div>
                        <div>
                            <button id="btn-right" class="text-xl btn btn-ghost"><i
                                    class="fa-solid fa-align-right"></i></button>
                        </div>
                        <div>
                            <button id="btn-justify" class="text-xl btn btn-ghost"><i
                                    class="fa-solid fa-align-justify"></i></button>
                        </div>
                    </div>
                    <!-- font style div -->
                    <div class="flex gap-5">
                        <input type="number" name="" id="text-size" class="w-12 px-1 rounded h-7 focus:outline-none">
                        <input type="color" name="" id="text-color" class="rounded">
                    </div>
                </div>
                <div class="bg-black h-[2px] w-11/12 mx-auto mb-3"></div>
                <div class="text-center">
                    <textarea name="" id="textarea" cols="150" rows="20"
                        class="p-2 mb-4 rounded focus:outline-none"></textarea>
                </div>
            </div>

        </section>
    </main>
    <footer></footer>
    <script src="js/index.js"></script>

</html> -->
